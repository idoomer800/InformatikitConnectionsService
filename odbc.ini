[ODBC Data Sources]
SQL SERVER Legacy Wire Protocol=DataDirect 7.1 SQL Server Legacy Wire Protocol
OracleProd  = Oracle Production Database
MySQL_Dev   = MySQL Local Development
Postgres_QA = PostgreSQL QA Server

[ODBC]
IANAAppCodePage=4
InstallDir=/inormat/pc/pc
Trace=0
TraceFile=odbctrace.out
TraceDll=/informat/something/something

[DB2 Wire Protocol]
Driver      = /u01/app/oracle/product/19.0.0/client_1/lib/libsqora.so.19.1
Description = Oracle 19c Production Server
AccountingInfo=
ApplicationUsingThreads=1
ConnectionReset=0
Database=<database_name>
GrantAuthid=PUBLIC

[OracleProd]
Driver      = /u01/app/oracle/product/19.0.0/client_1/lib/libsqora.so.19.1
Description = Oracle 19c Production Server
ServerName  = PROD_DB

[MySQL_Dev]
Driver      = /usr/lib/x86_64-linux-gnu/odbc/libmyodbc8w.so
Description = MySQL 8.0 local database
Host        = 127.0.0.1
Port        = 3306
Database    = my_app_db
User        = dev_user
Password    = dev_password
Option      = 3

[Postgres_QA]
Driver      = /usr/lib/x86_64-linux-gnu/odbc/psqlodbcw.so
Description = PostgreSQL QA Environment
Servername  = qa-db.example.com
Port        = 5432
Database    = qa_records
ReadOnly    = No